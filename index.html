<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IOPN Lucky Guestbook</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/ethers@6.13.1/dist/ethers.umd.min.js"></script>

</head>

<body>

<header>

<img src="assets/logo.png" class="logo">

<h1>IOPN Lucky Guestbook</h1>

<button id="connectBtn">
Connect Wallet
</button>

</header>

<section class="hero">

<h2>
Sign the Guestbook &
Receive an NFT 🎁
</h2>

<p>
Every signature mints a unique NFT on IOPN.
</p>

</section>

<section class="card">

<input
id="message"
placeholder="Write your message..."
maxlength="100"
/>

<button id="signBtn">
Sign Guestbook
</button>

<p id="status"></p>

</section>

<section>

<h2>Recent Entries</h2>

<div id="entries"></div>

</section>

<footer>

<p>
Powered by IOPN Blockchain
</p>

<a
href="https://x.com/JoyboyOGC"
target="_blank"
>
@JoyboyOGC
</a>

</footer>

<script src="app.js"></script>

</body>
</html>
